{% extends 'core/base.html' %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px;">
    <h1 style="font-size: 32px; font-weight: 700; letter-spacing: -1px; color: var(--text-light);">Abrir Novo Chamado</h1>
    <a href="{% url 'dashboard' %}" class="btn-secondary">← Voltar ao Dashboard</a>
</div>

<div class="card" style="max-width: 800px; margin: 0 auto;">
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group" style="margin-bottom: 25px;">
            <label for="{{ form.titulo.id_for_label }}" style="color: var(--text-muted); margin-bottom: 8px; display: block; font-weight: 600;">Título do Problema</label>
            {{ form.titulo }}
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
            <div class="form-group">
                <label for="{{ form.categoria.id_for_label }}" style="color: var(--text-muted); margin-bottom: 8px; display: block; font-weight: 600;">Categoria</label>
                {{ form.categoria }}
            </div>
            <div class="form-group">
                <label for="{{ form.prioridade.id_for_label }}" style="color: var(--text-muted); margin-bottom: 8px; display: block; font-weight: 600;">Prioridade</label>
                {{ form.prioridade }}
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 35px;">
            <label for="{{ form.descricao.id_for_label }}" style="color: var(--text-muted); margin-bottom: 8px; display: block; font-weight: 600;">Descrição Detalhada</label>
            {{ form.descricao }}
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; font-size: 16px; padding: 16px; letter-spacing: 0.5px;">
            Submeter Chamado
        </button>
    </form>
</div>
{% endblock %}
