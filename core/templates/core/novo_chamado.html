{% extends 'core/base.html' %}

{% block content %}
<div class="dashboard-header">
    <h1>Abrir Novo Chamado</h1>
    <a href="{% url 'dashboard' %}" class="btn-secondary">Voltar ao Dashboard</a>
</div>

<div class="card form-container">
    <form method="POST" action="{% url 'novo_chamado' %}">
        {% csrf_token %} <div class="form-group">
            <label for="{{ form.titulo.id_for_label }}">Título do Chamado</label>
            {{ form.titulo }}
        </div>

        <div class="form-row">
            <div class="form-group half">
                <label for="{{ form.categoria.id_for_label }}">Categoria</label>
                {{ form.categoria }}
            </div>
            <div class="form-group half">
                <label for="{{ form.prioridade.id_for_label }}">Prioridade</label>
                {{ form.prioridade }}
            </div>
        </div>

        <div class="form-group">
            <label for="{{ form.descricao.id_for_label }}">Descrição do Problema</label>
            {{ form.descricao }}
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 15px;">Enviar Chamado</button>
    </form>
</div>
{% endblock %}
