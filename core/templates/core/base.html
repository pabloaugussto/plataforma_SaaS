{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpDesk SaaS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}?v=2">
</head>
<body>

    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">H<span>D</span></div>
            <div class="logo-text">Help<span>Desk</span></div>
        </div>
        
        <nav style="display: flex; flex-direction: column; height: 100%;">
            <div>
                <a href="{% url 'dashboard' %}" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">Dashboard</span>
                </a>
                <a href="{% url 'novo_chamado' %}" class="nav-item">
                    <span class="nav-icon">➕</span>
                    <span class="nav-text">Novo Chamado</span>
                </a>
                <a href="{% url 'configuracoes' %}" class="nav-item">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-text">Configurações</span>
                </a>
            </div>
            
            <div style="margin-top: auto;">
                <form action="{% url 'logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="nav-item" style="width: 100%; text-align: left; background: none; border: none; cursor: pointer;">
                        <span class="nav-icon">🚪</span>
                        <span class="nav-text" style="color: #ff4d4f;">Sair do Sistema</span>
                    </button>
                </form>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="user-info">
                Bem-vindo de volta, <strong>{{ request.user.username }}</strong>
            </div>
            <div class="topbar-actions">
                <a href="{% url 'novo_chamado' %}" class="btn-primary">+ Abrir Chamado</a>
            </div>
        </header>

        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
